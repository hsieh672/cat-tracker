<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .view-toggle button {
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .view-toggle button.active {
            background: white;
            color: #667eea;
        }

        .period-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .period-selector button {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .period-selector button:hover {
            background: rgba(255,255,255,0.5);
        }

        .period-text {
            font-size: 1.1em;
            min-width: 150px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, select, button {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-add:hover {
            transform: scale(1.05);
        }

        .entries {
            margin-top: 30px;
        }

        .date-group {
            margin-bottom: 30px;
        }

        .date-header {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .date-total {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }

        .entry-item {
            background: white;
            border: 2px solid #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .entry-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .entry-info {
            flex: 1;
        }

        .entry-food {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .entry-meta {
            color: #666;
            font-size: 0.9em;
        }

        .entry-calories {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-right: 15px;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff3838;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Calorie Tracker</h1>
            
            <div class="stats">
                <div class="view-toggle">
                    <button id="btnDaily" class="active">Daily</button>
                    <button id="btnWeekly">Weekly</button>
                    <button id="btnMonthly">Monthly</button>
                </div>
                
                <div class="period-selector">
                    <button id="btnPrevPeriod">◀</button>
                    <div class="period-text" id="periodText"></div>
                    <button id="btnNextPeriod">▶</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Avg kcal/day</div>
                        <div class="stat-value" id="avgCalories">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="totalCalories">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Days</div>
                        <div class="stat-value" id="daysCount">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="input-section">
                <h2 style="margin-bottom: 15px;">Add Entry</h2>
                <div class="input-group">
                    <input type="text" id="foodInput" placeholder="Food name" list="foodSuggestions">
                    <datalist id="foodSuggestions"></datalist>
                    <input type="number" id="caloriesInput" placeholder="Calories" min="0">
                    <select id="timeSelect">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                    <button class="btn-add" onclick="addEntry()">Add</button>
                </div>
            </div>

            <div class="entries" id="entriesList"></div>
        </div>
    </div>

    <script>
        let entries = [];
        let currentView = 'daily'; // daily, weekly, monthly
        let currentDate = new Date();

        // Load entries from storage
        async function loadEntries() {
            try {
                const result = await window.storage.get('calorie-entries');
                if (result && result.value) {
                    entries = JSON.parse(result.value);
                }
            } catch (error) {
                console.log('No previous entries found');
            }
            renderEntries();
            updateStats();
            updateFoodSuggestions();
        }

        // Save entries to storage
        async function saveEntries() {
            try {
                await window.storage.set('calorie-entries', JSON.stringify(entries));
            } catch (error) {
                console.error('Failed to save entries:', error);
            }
        }

        // Add new entry
        async function addEntry() {
            const food = document.getElementById('foodInput').value.trim();
            const calories = parseInt(document.getElementById('caloriesInput').value);
            const time = document.getElementById('timeSelect').value;

            if (!food || !calories) {
                alert('Please enter both food name and calories');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            
            // Check if same food exists today with same time period
            const existingEntry = entries.find(e => 
                e.date === today && 
                e.food.toLowerCase() === food.toLowerCase() && 
                e.time === time
            );

            if (existingEntry) {
                // Accumulate calories
                existingEntry.calories += calories;
            } else {
                // Add new entry
                const entry = {
                    id: Date.now(),
                    food: food,
                    calories: calories,
                    time: time,
                    date: today,
                    timestamp: new Date().toISOString()
                };
                entries.unshift(entry);
            }

            await saveEntries();
            
            // Clear inputs
            document.getElementById('foodInput').value = '';
            document.getElementById('caloriesInput').value = '';
            
            renderEntries();
            updateStats();
            updateFoodSuggestions();
        }

        // Delete entry
        async function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            await saveEntries();
            renderEntries();
            updateStats();
            updateFoodSuggestions();
        }

        // Get date range based on current view
        function getDateRange() {
            const today = new Date(currentDate);
            let startDate, endDate, periodText;

            if (currentView === 'daily') {
                startDate = new Date(today);
                endDate = new Date(today);
                periodText = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } else if (currentView === 'weekly') {
                const dayOfWeek = today.getDay();
                const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
                startDate = new Date(today);
                startDate.setDate(today.getDate() - diff);
                endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + 6);
                periodText = `${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
            } else { // monthly
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                endDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                periodText = today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            }

            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(23, 59, 59, 999);

            return { startDate, endDate, periodText };
        }

        // Update statistics
        function updateStats() {
            const { startDate, endDate, periodText } = getDateRange();
            document.getElementById('periodText').textContent = periodText;

            const filteredEntries = entries.filter(e => {
                const entryDate = new Date(e.date + 'T00:00:00');
                return entryDate >= startDate && entryDate <= endDate;
            });

            const totalCalories = filteredEntries.reduce((sum, e) => sum + e.calories, 0);
            
            // Calculate unique days
            const uniqueDays = new Set(filteredEntries.map(e => e.date)).size;
            const avgCalories = uniqueDays > 0 ? Math.round(totalCalories / uniqueDays) : 0;

            document.getElementById('avgCalories').textContent = avgCalories;
            document.getElementById('totalCalories').textContent = totalCalories.toLocaleString();
            document.getElementById('daysCount').textContent = uniqueDays;
        }

        // Render entries
        function renderEntries() {
            const { startDate, endDate } = getDateRange();
            const entriesList = document.getElementById('entriesList');

            const filteredEntries = entries.filter(e => {
                const entryDate = new Date(e.date + 'T00:00:00');
                return entryDate >= startDate && entryDate <= endDate;
            });

            if (filteredEntries.length === 0) {
                entriesList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                        </svg>
                        <h3>No entries yet</h3>
                        <p>Start tracking your calories!</p>
                    </div>
                `;
                return;
            }

            // Group by date
            const grouped = {};
            filteredEntries.forEach(entry => {
                if (!grouped[entry.date]) {
                    grouped[entry.date] = [];
                }
                grouped[entry.date].push(entry);
            });

            // Sort dates descending
            const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

            let html = '';
            sortedDates.forEach(date => {
                const dateEntries = grouped[date];
                const dateTotal = dateEntries.reduce((sum, e) => sum + e.calories, 0);
                const dateObj = new Date(date + 'T00:00:00');
                const dateStr = dateObj.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    month: 'long', 
                    day: 'numeric' 
                });

                html += `
                    <div class="date-group">
                        <div class="date-header">
                            <div class="date-title">${dateStr}</div>
                            <div class="date-total">${dateTotal} kcal</div>
                        </div>
                `;

                // Sort entries by time (AM first, then PM) and timestamp
                dateEntries.sort((a, b) => {
                    if (a.time !== b.time) {
                        return a.time === 'AM' ? -1 : 1;
                    }
                    return new Date(b.timestamp) - new Date(a.timestamp);
                });

                dateEntries.forEach(entry => {
                    const time = new Date(entry.timestamp).toLocaleTimeString('en-US', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });

                    html += `
                        <div class="entry-item">
                            <div class="entry-info">
                                <div class="entry-food">${entry.food}</div>
                                <div class="entry-meta">${entry.time} • ${time}</div>
                            </div>
                            <div class="entry-calories">${entry.calories} kcal</div>
                            <button class="btn-delete" onclick="deleteEntry(${entry.id})">Delete</button>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            entriesList.innerHTML = html;
        }

        // Update food suggestions
        function updateFoodSuggestions() {
            const foods = [...new Set(entries.map(e => e.food))];
            const datalist = document.getElementById('foodSuggestions');
            datalist.innerHTML = foods.map(food => `<option value="${food}">`).join('');
        }

        // View toggle handlers
        document.getElementById('btnDaily').addEventListener('click', () => {
            currentView = 'daily';
            currentDate = new Date();
            updateViewButtons();
            updateStats();
            renderEntries();
        });

        document.getElementById('btnWeekly').addEventListener('click', () => {
            currentView = 'weekly';
            currentDate = new Date();
            updateViewButtons();
            updateStats();
            renderEntries();
        });

        document.getElementById('btnMonthly').addEventListener('click', () => {
            currentView = 'monthly';
            currentDate = new Date();
            updateViewButtons();
            updateStats();
            renderEntries();
        });

        function updateViewButtons() {
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (currentView === 'daily') {
                document.getElementById('btnDaily').classList.add('active');
            } else if (currentView === 'weekly') {
                document.getElementById('btnWeekly').classList.add('active');
            } else {
                document.getElementById('btnMonthly').classList.add('active');
            }
        }

        // Period navigation
        document.getElementById('btnPrevPeriod').addEventListener('click', () => {
            if (currentView === 'daily') {
                currentDate.setDate(currentDate.getDate() - 1);
            } else if (currentView === 'weekly') {
                currentDate.setDate(currentDate.getDate() - 7);
            } else {
                currentDate.setMonth(currentDate.getMonth() - 1);
            }
            updateStats();
            renderEntries();
        });

        document.getElementById('btnNextPeriod').addEventListener('click', () => {
            if (currentView === 'daily') {
                currentDate.setDate(currentDate.getDate() + 1);
            } else if (currentView === 'weekly') {
                currentDate.setDate(currentDate.getDate() + 7);
            } else {
                currentDate.setMonth(currentDate.getMonth() + 1);
            }
            updateStats();
            renderEntries();
        });

        // Enter key support
        document.getElementById('foodInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addEntry();
        });

        document.getElementById('caloriesInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addEntry();
        });

        // Initialize
        loadEntries();
    </script>
</body>
</html>
